  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crush kita haha joke lang 💘</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0010;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Starfield background */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 0.9; transform: scale(1.2); }
  }

  /* Floating mini hearts */
  .floaters {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .floater {
    position: absolute;
    bottom: -60px;
    font-size: var(--fs);
    animation: floatUp var(--spd) ease-in infinite;
    animation-delay: var(--delay);
    opacity: 0.6;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* SVG Heart */
  .heart-wrap {
    position: relative;
    width: 340px;
    height: 310px;
  }
  .heart-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 30px #ff1a4a88) drop-shadow(0 0 60px #ff1a4a44);
    animation: heartbeat 1.4s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14%      { transform: scale(1.12); }
    28%      { transform: scale(1); }
    42%      { transform: scale(1.08); }
    56%      { transform: scale(1); }
  }

  /* Text inside heart */
  .heart-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    pointer-events: none;
    padding-bottom: 20px;
  }
  .heart-text .line1 {
    font-family: 'Pacifico', cursive;
    font-size: 22px;
    color: #fff;
    text-shadow: 0 0 10px #ff6688, 0 2px 4px rgba(0,0,0,0.4);
    animation: textPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  }
  .heart-text .line2 {
    font-family: 'Pacifico', cursive;
    font-size: 20px;
    color: #ffe0e8;
    text-shadow: 0 0 8px #ff6688;
    animation: textPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
  }
  .heart-text .line3 {
    font-size: 13px;
    font-weight: 700;
    color: #ffccd8;
    letter-spacing: 1px;
    text-transform: uppercase;
    animation: textPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.7s both;
  }
  @keyframes textPop {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Bottom label */
  .tagline {
    margin-top: 24px;
    font-family: 'Pacifico', cursive;
    font-size: 15px;
    color: #ff6688;
    letter-spacing: 2px;
    text-align: center;
    animation: fadeSlide 1s ease 1s both;
    text-shadow: 0 0 20px #ff336655;
  }
  .april-fools {
    margin-top: 8px;
    font-size: 13px;
    font-weight: 700;
    color: #ffaacc;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeSlide 1s ease 1.2s both;
    opacity: 0.8;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Confetti burst */
  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 20;
  }
  .conf {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confettiFall var(--cd) ease-in var(--cdelay) both;
    opacity: 0;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(var(--cy)) translateX(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(110vh) translateX(var(--cx)) rotate(720deg) scale(0.4); }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Floating hearts -->
<div class="floaters" id="floaters"></div>

<!-- Confetti -->
<div class="confetti-wrap" id="confetti"></div>

<!-- Main -->
<div class="content">
  <div class="heart-wrap">
    <svg class="heart-svg" viewBox="0 0 200 185" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hg" cx="50%" cy="40%" r="60%">
          <stop offset="0%"   stop-color="#ff6688"/>
          <stop offset="50%"  stop-color="#e8102e"/>
          <stop offset="100%" stop-color="#8b0000"/>
        </radialGradient>
        <radialGradient id="shine" cx="35%" cy="30%" r="40%">
          <stop offset="0%"  stop-color="rgba(255,255,255,0.35)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>
      <!-- Main heart -->
      <path d="M100,170 C40,130 10,95 10,60 C10,30 30,12 55,12 C72,12 87,22 100,38 C113,22 128,12 145,12 C170,12 190,30 190,60 C190,95 160,130 100,170 Z"
            fill="url(#hg)" stroke="#c0002a" stroke-width="1.5"/>
      <!-- Shine overlay -->
      <path d="M100,170 C40,130 10,95 10,60 C10,30 30,12 55,12 C72,12 87,22 100,38 C113,22 128,12 145,12 C170,12 190,30 190,60 C190,95 160,130 100,170 Z"
            fill="url(#shine)"/>
      <!-- Highlight blob -->
      <ellipse cx="72" cy="45" rx="18" ry="12" fill="rgba(255,255,255,0.18)" transform="rotate(-20,72,45)"/>
    </svg>

    <div class="heart-text">
      <span class="line1">Crush kita haha</span>
      <span class="line2">joke lang 😂</span>

    </div>
  </div>

  <div class="tagline">Happy April Fools! 🎉</div>
  <div class="april-fools">April 1 · Got you? 😏</div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${(Math.random()*3+1.5).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // Floating hearts
  const floatersEl = document.getElementById('floaters');
  const emojis = ['❤️','💕','💗','💓','💘','💖','🩷'];
  for (let i = 0; i < 18; i++) {
    const f = document.createElement('div');
    f.className = 'floater';
    f.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    f.style.cssText = `
      left:${Math.random()*100}%;
      --fs:${(Math.random()*18+10).toFixed(0)}px;
      --spd:${(Math.random()*6+5).toFixed(1)}s;
      --delay:${(Math.random()*8).toFixed(1)}s;
    `;
    floatersEl.appendChild(f);
  }

  // Confetti burst on load
  const confEl = document.getElementById('confetti');
  const colors = ['#ff3366','#ff9900','#ffdd00','#00ccff','#ff66cc','#66ff99','#ff6633'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    const angle = Math.random() * 360;
    const dist = Math.random() * 300 + 100;
    const dx = Math.cos(angle * Math.PI/180) * dist;
    const startY = cy - Math.random() * 200;
    c.style.cssText = `
      left:${cx}px; top:${startY}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --cd:${(Math.random()*1.5+1).toFixed(2)}s;
      --cdelay:${(Math.random()*0.8).toFixed(2)}s;
      --cx:${dx.toFixed(0)}px;
      --cy:${(startY - window.innerHeight - 100).toFixed(0)}px;
      transform: rotate(${Math.random()*360}deg);
    `;
    confEl.appendChild(c);
  }
</script>
</body>
</html>
    
  </body>
  
</html>
